name: Deploy EMA Swing Live

on:
  push:
    branches:
      - main
    paths:
      - "ema_swing_live/**"
      - "backtesting/etf_backtester/**"
      - ".github/workflows/deploy-ema-swing-live.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: "main"

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    concurrency:
      group: ema-swing-live-production
      cancel-in-progress: true
    env:
      DEPLOY_BRANCH: ${{ inputs.branch || github.ref_name }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_PORT: ${{ secrets.EC2_PORT }}
      EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
      SERVICE_NAME: ${{ secrets.EC2_SERVICE_NAME }}
    steps:
      - name: Validate required secrets
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          test -n "$EC2_HOST" || { echo "Missing EC2_HOST secret"; exit 1; }
          test -n "$EC2_USER" || { echo "Missing EC2_USER secret"; exit 1; }
          test -n "$EC2_SSH_PRIVATE_KEY" || { echo "Missing EC2_SSH_PRIVATE_KEY secret"; exit 1; }

      - name: Configure SSH
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/ema_swing_live
          chmod 600 ~/.ssh/ema_swing_live
          ssh-keyscan -p "${EC2_PORT:-22}" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        run: |
          EC2_PORT="${EC2_PORT:-22}"
          EC2_APP_DIR="${EC2_APP_DIR:-/opt/ema-swing-live}"
          SERVICE_NAME="${SERVICE_NAME:-ema-swing-live}"

          remote_env=$(
            printf "DEPLOY_BRANCH=%q APP_DIR=%q SERVICE_NAME=%q" \
              "$DEPLOY_BRANCH" "$EC2_APP_DIR" "$SERVICE_NAME"
          )

          ssh -i ~/.ssh/ema_swing_live \
            -p "$EC2_PORT" \
            "$EC2_USER@$EC2_HOST" \
            "$remote_env bash -lc 'cd \"\$APP_DIR\" && bash ./ema_swing_live/deploy/deploy_ec2.sh \"\$DEPLOY_BRANCH\"'"
